<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive Me BUBU ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle at top, #ff758c, #ff7eb3, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        color: white;
    }

    h1 {
        font-size: 3.5em;
        margin: 0;
        animation: pulse 2s infinite;
    }

    h2 {
        font-weight: normal;
        margin-top: 10px;
        min-height: 40px;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    .buttons {
        margin-top: 30px;
        position: relative;
    }

    button {
        padding: 12px 30px;
        font-size: 18px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    #yesBtn {
        background: #ff2e63;
        color: white;
        box-shadow: 0 0 20px rgba(255, 46, 99, 0.7);
    }

    #yesBtn:hover {
        transform: scale(1.15);
    }

    #noBtn {
        background: #252a34;
        color: white;
        position: absolute;
    }

    #finalMessage {
        font-size: 3em;
        margin-top: 40px;
        display: none;
        animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .heart {
        position: absolute;
        bottom: -20px;
        font-size: 20px;
        animation: float 6s linear infinite;
        opacity: 0.8;
    }

    @keyframes float {
        from {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        to {
            transform: translateY(-900px) scale(1.5);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<h1>I am Sorry BUBU 💔</h1>
<h2 id="typing"></h2>

<div class="buttons">
    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 😢</button>
</div>

<div id="finalMessage">I LOVE YOU FOREVER ❤️</div>

<script>
    const text = "Can you forgive me... please? 🥺";
    const typingEl = document.getElementById("typing");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const finalMessage = document.getElementById("finalMessage");

    // Typewriter Effect
    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            typingEl.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 80);
        }
    }
    typeWriter();

    // Yes Click
    yesBtn.addEventListener("click", () => {
        finalMessage.style.display = "block";
        generateHearts();
    });

    // No Button Escape Logic 😄
    noBtn.addEventListener("mouseover", moveNoButton);
    noBtn.addEventListener("click", () => yesBtn.click());

    function moveNoButton() {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        noBtn.style.left = `${x}px`;
        noBtn.style.top = `${y}px`;
    }

    // Floating Hearts
    function generateHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.fontSize = (Math.random() * 25 + 15) + "px";
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 6000);
        }, 300);
    }
</script>

</body>
</html>
