<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive Me BUBU ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle, #ff5f6d, #ffc371);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 4em;
    margin: 0;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 30px #ff2e63; }
}

h2 {
    margin-top: 10px;
    font-weight: 300;
}

.buttons {
    margin-top: 30px;
}

button {
    padding: 12px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

#yesBtn {
    background: #ff2e63;
    color: white;
    box-shadow: 0 0 20px #ff2e63;
}

#yesBtn:hover {
    transform: scale(1.15);
}

#noBtn {
    background: #252a34;
    color: white;
}

#finalMessage {
    font-size: 3.2em;
    margin-top: 40px;
    display: none;
    font-family: 'Dancing Script', cursive;
    animation: zoomIn 1.5s forwards;
}

@keyframes zoomIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<h1>I am Sorry BUBU 💔</h1>
<h2>Can you forgive me?</h2>

<div class="buttons">
    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 😢</button>
</div>

<div id="finalMessage">I LOVE YOU FOREVER BUBU ❤️</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const finalMessage = document.getElementById("finalMessage");

// YES CLICK
yesBtn.addEventListener("click", () => {
    noBtn.style.display = "none";      // No disappears
    yesBtn.style.display = "none";     // Yes also disappears (dramatic clean ending)
    finalMessage.style.display = "block";
    generateHearts();
});

// NO CLICK
noBtn.addEventListener("click", () => {
    noBtn.style.display = "none";      // Only No disappears
});

// HEART EFFECT
function generateHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.fontSize = (Math.random() * 25 + 15) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 250);
}
</script>

</body>
</html>
